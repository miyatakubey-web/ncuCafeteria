<style>
  body {
    font-family: sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* メイン（上半分） */
  .main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }

  /* サイドバー（下半分固定） */
  .sidebar {
    height: 50vh;
    background: #f0f0f0;
    padding: 0;
    box-sizing: border-box;
    overflow: hidden;
    border-top: 1px solid #ccc;
    transition: height 0.3s ease;
    position: relative;
  }

  /* 折りたたみ時 */
  .sidebar.collapsed {
    height: 80px;
  }

  /* サイドバーのヘッダー */
  .sidebar-header {
    background: #e0e0e0;
    padding: 10px;
    font-size: 18px;
    border-bottom: 1px solid #ccc;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* サイドバーの中身 */
  .sidebar-content {
    padding: 15px;
    overflow-y: auto;
    height: calc(50vh - 50px);
    max-height: 100%;
  }

  .sidebar.collapsed .sidebar-content {
    display: none;
  }

  .selected-list {
    margin-top: 20px;
    padding: 10px;
    background: #fafafa;
    border: 1px solid #ddd;
  }

  button { padding: 10px 16px; font-size: 16px; }
  input[type="text"] { width: 100%; padding: 8px; margin-bottom: 10px; font-size: 16px; }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 8px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
  }

  .menu-image {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .menu-info {
    flex: 1;
  }

  /* スマホ用 */
  @media (max-width: 600px) {
    .main { padding: 15px; }
    button { width: 100%; margin-top: 15px; }
  }
</style>

// メニュー一覧を表示
function showMenu(filter = "") {
  let html = "";
  for (const num in menu) {
    const item = menu[num];
    if (item.name.includes(filter)) {
      html += `
        <div class="menu-item">
          <input type="checkbox" class="menu-check" value="${num}" onchange="updateSelected()">
          <img src="${item.image}" alt="${item.name}" class="menu-image">
          <div class="menu-info">
            <div><strong>${num}: ${item.name}</strong></div>
            <div style="font-size: 12px; color: #666;">${item.price}円 / ${item.kcal}kcal</div>
          </div>
        </div>
      `;
    }
  }
  document.getElementById("menuList").innerHTML = html;
}
showMenu();

// 検索
function filterMenu() {
  const word = document.getElementById("search").value;
  showMenu(word);
  updateSelected();
}

// 選択中メニュー表示
function updateSelected() {
  const checks = document.querySelectorAll(".menu-check:checked");
  let html = "";

  checks.forEach(c => {
    const n = c.value;
    html += `${menu[n].name}（${menu[n].price}円）<br>`;
  });

  document.getElementById("selectedItems").innerHTML =
    html || "まだ選択されていません";
}

// 合計計算
function calc() {
  const checks = document.querySelectorAll(".menu-check:checked");

  const total = { price:0, kcal:0, protein:0, fat:0, salt:0, ca:0, veg:0 };

  checks.forEach(c => {
    const n = c.value;
    total.price   += menu[n].price;
    total.kcal    += menu[n].kcal;
    total.protein += menu[n].protein;
    total.fat     += menu[n].fat;
    total.salt    += menu[n].salt;
    total.ca      += menu[n].ca;
    total.veg     += menu[n].veg;
  });

  document.getElementById("result").innerHTML = `
    <h3>合計結果</h3>
    金額：${total.price} 円<br>
    エネルギー：${total.kcal} kcal<br>
    たんぱく質：${total.protein} g<br>
    脂質：${total.fat} g<br>
    食塩相当量：${total.salt} g<br>
    カルシウム：${total.ca} mg<br>
    野菜量：${total.veg} g
  `;
}

// サイドバー開閉
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const btn = document.getElementById("toggleBtn");

  sidebar.classList.toggle("collapsed");

  if (sidebar.classList.contains("collapsed")) {
    btn.innerHTML = "&#9650;"; // ▲ 開く
  } else {
    btn.innerHTML = "&#9660;"; // ▼ 閉じる
  }
}
